# TreasureHunt Configuration

# MySQL Database Settings
mysql:
  host: localhost
  port: 3306
  database: treasurehunt
  username: root
  password: password
  pool-size: 10
  connection-timeout: 30000
  idle-timeout: 600000
  max-lifetime: 1800000

# Messages (supports color codes with &)
messages:
  prefix: "&6[TreasureHunt] &r"
  treasure-found: "&aYou found a treasure!"
  already-claimed: "&cYou have already claimed this treasure!"
  treasure-created: "&aTreasure '%id%' created successfully!"
  treasure-deleted: "&aTreasure '%id%' deleted successfully!"
  treasure-not-found: "&cTreasure '%id%' not found!"
  select-block: "&eClick on a block to set it as the treasure location."
  no-permission: "&cYou don't have permission to use this command!"
  player-only: "&cThis command can only be used by players!"
  invalid-usage: "&cUsage: /treasure <create|delete|completed|list|gui>"
  no-treasures: "&cNo treasures have been created yet."
  gui-title: "&8Treasure Management"

# GUI Settings
gui:
  items-per-page: 45
  filler-material: BLACK_STAINED_GLASS_PANE
  next-page-material: ARROW
  previous-page-material: ARROW
  delete-material: BARRIER
  treasure-material: CHEST
  completed-material: PLAYER_HEAD
