# TreasureHunt Configuration

# Database Settings
database:
  host: localhost
  port: 3306
  database: treasurehunt
  username: root
  password: password
  pool-size: 10
  # Sync interval in seconds for checking new claims from other servers
  sync-interval: 30

# Messages
messages:
  prefix: "&6[TreasureHunt] &r"
  treasure-created: "&aTreasure '&e%id%&a' created successfully!"
  treasure-deleted: "&aTreasure '&e%id%&a' deleted successfully!"
  treasure-not-found: "&cTreasure '&e%id%&c' not found."
  treasure-already-exists: "&cTreasure '&e%id%&c' already exists."
  select-block: "&eClick on a block to set it as the treasure."
  selection-cancelled: "&cSelection cancelled."
  treasure-already-claimed: "&cYou have already claimed this treasure."
  treasure-claimed: "&aYou found a treasure!"
  no-permission: "&cYou don't have permission to use this command."
  invalid-usage: "&cUsage: /treasure <create|delete|completed|list|gui>"
  no-treasures: "&cNo treasures found."
  treasure-list-header: "&6=== Treasures ==="
  treasure-list-item: "&e- &f%id% &7at %world% (%x%, %y%, %z%)"
  completed-header: "&6=== Players who found '%id%' ==="
  completed-item: "&e- &f%player% &7(%date%)"
  no-completions: "&cNo players have found this treasure yet."
  gui-title: "&8Treasure Manager"
